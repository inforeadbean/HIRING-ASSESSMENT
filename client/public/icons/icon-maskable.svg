<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C41E3A"/>
      <stop offset="100%" stop-color="#9f1239"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background for maskable (no border radius) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Content kept within safe zone (center 80% = 56px padding each side = 56 to 456) -->
  <text x="256" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="210" font-weight="900" text-anchor="middle" fill="white" letter-spacing="-6">RB</text>
  <text x="256" y="380" font-family="system-ui,-apple-system,sans-serif" font-size="36" font-weight="500" text-anchor="middle" fill="rgba(255,255,255,0.65)">Assessment</text>
</svg>
